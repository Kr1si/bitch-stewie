name: Deploy to krisiserver

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # manual re-deploy from the Actions tab

# Never run two deploys at once; a push during a deploy queues (not cancels)
# so the newest commit still lands last.
concurrency:
  group: deploy-krisiserver
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: krisiserver
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.KRISISERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Host key pinned (public info) - no TOFU against a fresh runner
          echo "194.182.86.101 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINfhTLkzrU1RYka6A5waaIpqITDbmirtImMcNIaH6PQW" >> ~/.ssh/known_hosts

      - name: Pull and rebuild stack
        run: |
          ssh deploy@194.182.86.101 'set -e
            # Build context: pristine checkout used by `docker compose --build`.
            # CC must never edit here or it dirties the image build.
            cd /home/deploy/bitch-stewie
            git fetch origin
            git reset --hard origin/main

            # Self-rewrite target: a SEPARATE checkout that CC edits, snapped to
            # latest main on every deploy. Mounted into the containers at
            # /projects/bitch-stewie. In the serial human-gated loop a deploy only
            # fires after a merge, so the session is already finished and this
            # reset is safe. `checkout -B main origin/main` lands on main whatever
            # branch CC left checked out; `clean -fd` drops stray untracked files.
            if [ ! -d /home/deploy/projects/bitch-stewie/.git ]; then
              git clone https://github.com/Kr1si/bitch-stewie.git /home/deploy/projects/bitch-stewie
            fi
            cd /home/deploy/projects/bitch-stewie
            git fetch origin
            git checkout -B main origin/main
            git clean -fd

            cd /home/deploy/bitch-stewie/docker
            sudo docker compose -f docker-compose.prod.yml up -d --build
            sudo docker image prune -f
            # idempotent: (re)syncs the built-in Project presets (bitch-stewie
            # self-improvement target etc.) after every deploy
            sudo docker compose -f docker-compose.prod.yml exec -T backend uv run assistant seed'

      - name: Verify
        run: |
          ssh deploy@194.182.86.101 '
            # backend runs alembic migrations before starting uvicorn (~25s on
            # a fresh boot), so poll until the API is up instead of a fixed sleep
            for i in $(seq 1 30); do
              code=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/projects || echo 000)
              if [ "$code" = "200" ]; then echo "API through nginx: HTTP $code (after ${i}0s)"; exit 0; fi
              sleep 10
            done
            echo "API through nginx: HTTP $code (never came up)"
            sudo docker compose -f bitch-stewie/docker/docker-compose.prod.yml ps
            sudo docker logs --tail 20 assistant-prod-backend-1
            exit 1'
