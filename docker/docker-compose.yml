name: assistant

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
      POSTGRES_DB: assistant
    ports:
      # 5433 on the host: 5432 is taken by the local langfuse stack
      - "5433:5432"
    volumes:
      - pg_data_v17:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  drawio:
    image: jgraph/drawio:latest
    ports:
      - "8080:8080"
    environment:
      # Required for embed mode from the frontend origin
      DRAWIO_SERVER_URL: "http://localhost:8080/"

  # backend / frontend containers are added in Phase 5;
  # during Phases 0-4 the backend runs on the host (it must spawn
  # Claude Code CLI processes and reach host Ollama directly).

volumes:
  pg_data_v17:
  qdrant_data:
