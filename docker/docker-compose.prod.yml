# Production stack for krisiserver. Everything binds 127.0.0.1 — access via
# SSH tunnel only (see docs/krisiserver.md). Dev infra stays in docker-compose.yml.
#
#   sudo docker compose -f docker-compose.prod.yml up -d --build
#
# One-time after first start (Ollama cloud sign-in, key on hand with the owner):
#   sudo docker exec -it assistant-ollama ollama signin

name: assistant-prod

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
      POSTGRES_DB: assistant
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  drawio:
    image: jgraph/drawio:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # frontend embeds http://localhost:8080 (tunnel it too)
    environment:
      DRAWIO_SERVER_URL: "http://localhost:8080/"

  ollama:
    image: ollama/ollama:latest
    container_name: assistant-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama   # holds the cloud sign-in credentials

  backend:
    build: ../backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      ASSISTANT_DATABASE_URL: postgresql://assistant:assistant@postgres:5432/assistant
      ASSISTANT_QDRANT_URL: http://qdrant:6333
      ASSISTANT_OLLAMA_BASE_URL: http://ollama:11434
      # The orchestrator/planner's chat model (ChatOllama, resolved via
      # init_chat_model("ollama:...")) reads OLLAMA_HOST directly, not
      # ASSISTANT_OLLAMA_BASE_URL - without this it defaults to
      # 127.0.0.1:11434 inside the container and every chat call fails with
      # "All connection attempts failed".
      OLLAMA_HOST: http://ollama:11434
      # Claude Code provider — defaults to local Ollama. Override in docker/.env
      # to use Z.ai or another Anthropic-compatible endpoint (see docker/.env.example).
      ASSISTANT_CC_ANTHROPIC_BASE_URL: ${ASSISTANT_CC_ANTHROPIC_BASE_URL:-http://ollama:11434}
      ASSISTANT_CC_ANTHROPIC_AUTH_TOKEN: ${ASSISTANT_CC_ANTHROPIC_AUTH_TOKEN:-ollama}
      ASSISTANT_CC_MODEL: ${ASSISTANT_CC_MODEL:-glm-5.2:cloud}
      ASSISTANT_CC_API_TIMEOUT_MS: ${ASSISTANT_CC_API_TIMEOUT_MS:-3000000}
      ASSISTANT_CC_PLUGINS_DIR: /opt/cc-plugins/enabled
      ASSISTANT_API_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:8000:8000"   # direct API access for debugging; UI goes via nginx
    volumes:
      - ${PROJECTS_PATH:-/home/deploy/projects}:/projects   # repos CC works on
      - model_cache:/home/assistant/.cache                            # fastembed bge-m3 download

  worker:
    build: ../backend
    restart: unless-stopped
    # procrastinate schema is not in alembic; apply is a no-op error once it
    # exists, hence the `|| true`
    command: >
      sh -c "uv run procrastinate --app=assistant.jobs.queue.app schema --apply || true;
             uv run assistant worker"
    depends_on:
      backend:
        condition: service_started   # backend runs the migrations
    environment:
      ASSISTANT_DATABASE_URL: postgresql://assistant:assistant@postgres:5432/assistant
      ASSISTANT_QDRANT_URL: http://qdrant:6333
      ASSISTANT_OLLAMA_BASE_URL: http://ollama:11434
      # see the backend service's comment above: ChatOllama reads this env
      # var directly, not ASSISTANT_OLLAMA_BASE_URL.
      OLLAMA_HOST: http://ollama:11434
      ASSISTANT_CC_ANTHROPIC_BASE_URL: ${ASSISTANT_CC_ANTHROPIC_BASE_URL:-http://ollama:11434}
      ASSISTANT_CC_ANTHROPIC_AUTH_TOKEN: ${ASSISTANT_CC_ANTHROPIC_AUTH_TOKEN:-ollama}
      ASSISTANT_CC_MODEL: ${ASSISTANT_CC_MODEL:-glm-5.2:cloud}
      ASSISTANT_CC_API_TIMEOUT_MS: ${ASSISTANT_CC_API_TIMEOUT_MS:-3000000}
      ASSISTANT_CC_PLUGINS_DIR: /opt/cc-plugins/enabled
      # git push over SSH from delegated CC sessions (see docs/krisiserver.md).
      # -i deploy's own key (already trusted by GitHub); StrictHostKeyChecking
      # accept-new since the container has no pre-seeded known_hosts.
      GIT_SSH_COMMAND: ssh -i /home/assistant/.ssh/deploy_key -o StrictHostKeyChecking=accept-new
    volumes:
      - ${PROJECTS_PATH:-/home/deploy/projects}:/projects
      - model_cache:/home/assistant/.cache
      - ${DEPLOY_SSH_KEY:-/home/deploy/.ssh/id_ed25519}:/home/assistant/.ssh/deploy_key:ro

  frontend:
    build: ../frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:3000:80"     # the page: tunnel 3000 and open http://localhost:3000

volumes:
  pg_data:
  qdrant_data:
  ollama_data:
  model_cache:
